name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Reused across jobs.
env:
  PRISMA_SCHEMA: packages/database/schema.prisma

jobs:
  test:
    name: Test (jest + live-DB E2E)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Setting DATABASE_URL turns on tests/integration/e2e.test.ts (it is
      # describe.skip without it). The schema is pushed below so the tables exist.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=$PRISMA_SCHEMA

      # No migrations directory exists; push the schema straight to the CI DB.
      - name: Push schema to CI database
        run: npx prisma db push --schema=$PRISMA_SCHEMA --skip-generate

      - name: Run tests
        run: npx jest --runInBand

  build-web:
    name: Build web (Next.js)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=$PRISMA_SCHEMA
      - name: Build web app
        run: npm run build --workspace=@qe/web

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build CLI
        run: npm run build --workspace=@qe/cli

  deploy-web:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    needs: [build-web, build-cli]
    # Only deploy from the default branch, never from PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    needs: [build-web, build-cli]
    # Publish only when a version tag is pushed (e.g. cli-v1.0.0 or v1.0.0).
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build CLI
        run: npm run build --workspace=@qe/cli
      # @qe/cli is a scoped package -> needs --access public on first publish.
      - name: Publish to npm
        run: npm publish --workspace=@qe/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
